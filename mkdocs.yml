site_name: graphfinder
site_description: Graph traversal & pathfinding (informed and uninformed search) with a Rust core.
site_author: Jose L. Salmeron
site_url: https://graphfinder.github.io/
repo_url: https://github.com/graphfinder/graphfinder.github.io
repo_name: graphfinder/graphfinder.github.io
copyright: Created by <a href="https://salmeron.cunef.edu">Jose L. Salmeron</a>
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - Tutorials:
      - Grid pathfinding: tutorials/grid.md
      - Comparing algorithms: tutorials/comparison.md
      - Random & implicit graphs: tutorials/graphs.md
      - Learned heuristic (PyTorch): tutorials/learned-heuristic.md
  - Concepts:
      - Algorithms: algorithms.md
      - Heuristics: heuristics.md
      - Domains: domains.md
      - Visualization: visualization.md
  - Integrations: integrations.md
  - Design & internals: architecture.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/graphfinder
      name: graphfinder on GitHub
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0001-7811-3716
      name: Jose L. Salmeron — ORCID
    - icon: material/web
      link: https://salmeron.cunef.edu
      name: Jose L. Salmeron — website
