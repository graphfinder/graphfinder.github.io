name: release-crates

# Publishes the Rust crate `graphfinder-core` to crates.io when a version tag is
# pushed, using crates.io Trusted Publishing (OIDC) — NO stored token.
#
# One-time setup: on the crate page
# https://crates.io/crates/graphfinder-core/settings → Trusted Publishing, add a
# GitHub publisher with:
#   Repository owner: graphfinder · Repository: graphfinder.github.io
#   Workflow filename: release-crates.yml · Environment: (leave empty)
#
# Trigger with:  git tag v0.1.0 && git push --tags

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for crates.io Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Mint a short-lived crates.io token via OIDC
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish graphfinder-core
        run: cargo publish -p graphfinder-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
